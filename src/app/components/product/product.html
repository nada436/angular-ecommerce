<div>
<div class="d-flex justify-content-between align-items-center mb-4 px-3 mt-5">
 @if(IsLogin.getUserRole()=='user'){ <h2 class="total-amount">
    Total: <span>${{ totalAmount }}</span>
  </h2>}
  
</div>


<div class="d-flex flex-wrap justify-content-between">
  @for (product of filteredList; track product.id) {
    <app-card
      [product]="product"
      (buy)="addToTotal($event)"
      (deleted)="onProductDeleted($event)"> 
    </app-card>
  }
</div>
</div>
