

<header class="bg-light shadow-sm">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light">
      <!-- Logo -->
      <a class="navbar-brand fw-bold" href="#">E-Shop</a>

      <!-- Toggle button for mobile -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
        aria-controls="navbarContent"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar links -->
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" [routerLink]="'/home'">Home</a>
          </li>
          @if(isLogin.getUserRole()==='admin')    {
            <li class="nav-item">
              <a class="nav-link" [routerLink]="'/dashboard'">dashboard</a> 
              </li>  
          }
          <li class="nav-item">
            <a class="nav-link" [routerLink]="'/contact'">Contact</a>
          </li>
        </ul>

        <form class="d-flex me-3 align-items-center">
 <input
  class="form-control me-2"
  type="search"
  placeholder="Search"
  aria-label="Search"
   name="search"    
  [(ngModel)]="searchTerm"
  (input)="applyFilter()"
/>

  <!-- Sort Icon -->
  <button
  type="button"
  class="btn btn-outline-secondary me-2"
  (click)="toggleSort()"
>
  <i
    class="bi"
    [ngClass]="
      sortOrder === 'asc'
        ? 'bi-sort-down'
        : 'bi-sort-up'
    "
  ></i>
</button>

 <!-- Theme Toggle -->
 <button
   type="button"
   class="btn btn-outline-secondary"
   (click)="toggleTheme()"
   aria-label="Toggle theme"
   title="Toggle theme"
 >
   <i class="bi" [ngClass]="theme() === 'dark' ? 'bi-sun' : 'bi-moon'"></i>
 </button>
        </form>

        <div class="d-flex align-items-center">
          
      
         
           @if (isLogin.islogin()) {
             <button class="btn btn-outline-dark mx-5" (click)="isLogin.logout()">Logout</button>
          } @else {      
            <button class="btn btn-outline-dark mx-5" routerLink="login">login</button>
          }
        </div>
      </div>
    </nav>
  </div>
</header>
