<div class="vh-100 d-flex justify-content-center align-items-center" style="background: url('background.jpg') no-repeat center center; background-size: cover;">
  <div class="card p-4 shadow" style="max-width: 450px; width: 100%; border-radius: 15px;">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <h1 class="text-center">Sign Up</h1>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" formControlName="name" placeholder="Choose a username">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="Create a password">
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-select" formControlName="role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button type="submit" class="btn btn-outline-dark w-100" [disabled]="form.invalid">Create Account</button>
    </form>
  </div>
</div>
