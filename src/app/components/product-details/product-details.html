<div class="container my-5  mb-5" style="min-height: 700px; ">
  <div class="row justify-content-center align-content-center">
 <div class="row align-items-center">

        <!-- Product Image -->
        <div class="col-md-6 text-center">
          <img
            [src]="product.thumbnail"
            [alt]="product.title"
            class="img-fluid rounded shadow-lg product-img"
          >
        </div>

        <!-- Product Info -->
        <div class="col-md-6">
          <h1 class="mb-3 text-pink">{{ product.title }}</h1>

          <p class="lead text-secondary">
            {{ product.description }}
          </p>

          <ul class="list-group mt-4">
            <li class="list-group-item bg-light">
              <strong>Price:</strong> ${{ product.price }}
            </li>

            <li class="list-group-item bg-light">
              <strong>Rating:</strong>
              @if (product.rating) {
                {{ product.rating }} ⭐
              } @else {
                No rating yet ⭐
              }
            </li>

            <li class="list-group-item bg-light">
              <strong>Stock:</strong> {{ product.stock }}
            </li>

            <li class="list-group-item bg-light">
              <strong>Brand:</strong> {{ product.brand }}
            </li>
          </ul>

          <!-- Out of stock badge -->
          @if (product.stock === 0) {
            <span class="badge bg-danger mt-3 d-inline-block">
              Out of Stock
            </span>
          }

          <!-- Button -->
          <div class="mt-5">
            <button
              class="btn btn-pink btn-lg"
              [disabled]="product.stock === 0"
            >
              Add to Cart
            </button>
          </div>

        </div>
  
      </div>  

    </div>
 <p [routerLink]="['/home']" class="text-end mt-5" style="cursor: pointer;">
  continue shopping <i class="fa-solid fa-arrow-right"></i>
</p>
  </div>
